<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTUREIX Demo Websites</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Inter,Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
        }

        .container{
            width:100%;
            max-width:1100px;
        }

        h1{
            text-align:center;
            font-size:3rem;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:#cbd5e1;
            margin-bottom:50px;
            font-size:18px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
            gap:25px;
        }

        .card{
            background:white;
            color:#111;
            border-radius:18px;
            padding:30px;
            transition:.3s;
            box-shadow:0 15px 35px rgba(0,0,0,.2);
        }

        .card:hover{
            transform:translateY(-8px);
        }

        .card h2{
            margin-bottom:12px;
        }

        .card p{
            color:#555;
            text-align:left;
            margin-bottom:25px;
            line-height:1.6;
        }

        a{
            display:inline-block;
            text-decoration:none;
            background:#111827;
            color:white;
            padding:12px 24px;
            border-radius:10px;
            transition:.3s;
        }

        a:hover{
            background:#2563eb;
        }

        footer{
            margin-top:60px;
            text-align:center;
            color:#94a3b8;
        }
    </style>
</head>

<body>

<div class="container">

<h1>🚀 FUTUREIX Demo Websites</h1>

<p>
Premium Website Collection by FUTUREIX
</p>

<div class="grid">

<div class="card">
<h2>💄 Cosmetics Website</h2>

<p>
Luxury beauty and cosmetics ecommerce website with premium UI, animations,
responsive design and modern shopping experience.
</p>

<a href="./COSMETICS/">Open Website</a>

</div>
